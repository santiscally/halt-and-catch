server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # límite de subida acorde al backend
  client_max_body_size 1m;

  # headers de seguridad (aplican a todo lo que sirve nginx, incluido el panel /admin)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # gzip
  gzip on;
  gzip_types text/css application/javascript image/svg+xml application/json;
  gzip_min_length 1024;

  # assets versionados de Vite (hash en el nombre) -> cache largo
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # fuentes e imágenes
  location ~* \.(woff2?|png|jpe?g|webp|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # API -> backend (preserva la ruta /api/...)
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA: cualquier ruta cae en index.html (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
