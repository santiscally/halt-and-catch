services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DB_PATH: /app/data/notas.db
      ADMIN_USER: ${ADMIN_USER:?definí ADMIN_USER en .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?definí ADMIN_PASSWORD en .env}
      JWT_SECRET: ${JWT_SECRET:?definí JWT_SECRET en .env}
      # false para HTTP (puerto 80); true cuando sirvas por HTTPS. Sin default: hay que elegirlo.
      COOKIE_SECURE: ${COOKIE_SECURE:?definí COOKIE_SECURE (false para HTTP, true para HTTPS) en .env}
    volumes:
      - notas_data:/app/data
    expose:
      - "4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  notas_data:
