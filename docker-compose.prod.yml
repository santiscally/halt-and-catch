# Producción con HTTPS automático (Caddy + Let's Encrypt).
# Uso en el VPS:
#   cp .env.example .env   (y completá ADMIN_*, JWT_SECRET, DOMAIN, ACME_EMAIL, COOKIE_SECURE=true)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Requisitos: el dominio (o subdominio) de DOMAIN debe apuntar (registro A) a la IP
# del VPS, y los puertos 80 y 443 abiertos. Caddy saca y renueva el certificado solo.

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DB_PATH: /app/data/notas.db
      ADMIN_USER: ${ADMIN_USER:?definí ADMIN_USER en .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?definí ADMIN_PASSWORD en .env}
      JWT_SECRET: ${JWT_SECRET:?definí JWT_SECRET en .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      TRUST_PROXY: "2"
    volumes:
      - notas_data:/app/data
    expose:
      - "4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?definí DOMAIN (tu dominio o subdominio) en .env}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  notas_data:
  caddy_data:
  caddy_config:
